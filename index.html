<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takanock IT Help Desk</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0ebe0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 680px;
     height: 80vh;
      background: #faf7f2;
      border: 0.5px solid #d8d0c0;
      border-radius: 4px;
      overflow: hidden;
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 0.5px solid #d8d0c0;
      background: #1a2744;
    }

    #header-left { display: flex; align-items: center; gap: 10px; }

    #header-title { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.55); letter-spacing: 0.2px; }
    #header-brand { font-size: 15px; font-weight: 500; color: #e8400a; letter-spacing: -0.2px; }
    #header-sub { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 1px; }

    #new-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 5px 11px;
      border: 0.5px solid rgba(255,255,255,0.3);
      border-radius: 3px;
      background: transparent;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.3px;
    }
    #new-btn:hover { background: rgba(255,255,255,0.1); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #faf7f2;
    }

    .msg { display: flex; flex-direction: column; gap: 4px; max-width: 82%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      border-radius: 3px;
    }

    .user .bubble {
      background: #1a2744;
      color: #fff;
    }

    .assistant .bubble {
      background: #fff;
      color: #1a2744;
      border: 0.5px solid #d8d0c0;
    }

    .msg-label { font-size: 11px; color: #a89e8a; padding: 0 2px; letter-spacing: 0.2px; }

    #typing {
      display: none;
      align-self: flex-start;
      padding: 0 0 4px;
    }
    #typing .bubble { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: #a89e8a; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    #input-area {
      padding: 12px 20px;
      border-top: 0.5px solid #d8d0c0;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #faf7f2;
    }

    #msg-input {
      flex: 1;
      resize: none;
      border: 0.5px solid #c8bfaf;
      border-radius: 3px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      color: #1a2744;
      background: #fff;
      max-height: 120px;
      outline: none;
      transition: border-color 0.15s;
    }
    #msg-input:focus { border-color: #1a2744; }
    #msg-input::placeholder { color: #b0a898; }

    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 3px;
      border: none;
      background: #e8400a;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.3; cursor: default; }

    #status-bar {
      padding: 5px 20px;
      background: #1a2744;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #status-dot { width: 5px; height: 5px; border-radius: 50%; background: #e8400a; }
    #status-text { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 0.2px; }
  </style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="header-left">
      <div>
        <div id="header-brand">takanock</div>
        <div id="header-title">IT Help Desk — Submit a support request</div>
      </div>
    </div>
    <button id="new-btn" onclick="resetChat()">
      <i class="ti ti-refresh"></i> New request
    </button>
  </div>

  <div id="messages">
    <div class="msg assistant">
      <span class="msg-label">IT Help Desk</span>
      <div class="bubble">Hi! I'm the Takanock IT Help Desk assistant. Tell me what's going on — I'll gather the details and log a ticket for you. What issue are you running into?</div>
    </div>
  </div>

  <div id="typing">
    <div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  </div>

  <div id="input-area">
    <textarea id="msg-input" rows="1" placeholder="Describe your IT issue…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" aria-label="Send">
      <i class="ti ti-arrow-up" style="font-size:18px"></i>
    </button>
  </div>

  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Connected — tickets log to Airtable</span>
  </div>
</div>

<script>
  // ⚠️ Replace with your actual Anthropic API key
  const API_KEY = 'YOUR_ANTHROPIC_API_KEY';

  const SYSTEM_PROMPT = `You are the Takanock IT Help Desk intake assistant. Your job is to help Takanock employees submit IT support requests conversationally.

When a user describes an issue, gather these fields through friendly conversation(don't ask for everything at once, but ask for the name and department at the same time first):
- Submitter Name (full name)
- Submitter Email (Takanock email), Do not ask them, use the convention: first letter of first name, last name, @takanock.com. If my name is John Smith, jsmith@takanock.com.
-Request Type: (Hardware, Software, Access/Permissions, Network, Other)
- Request Description: Brief description of the issue
- Urgency: (Low, Medium, High, Urgent) — infer from context if possible and confirm
- Any steps already tried

Once you have enough info, summarize the ticket and confirm with the user before logging it. Say something like: "Here's what I'll log — does this look right?" Then if they confirm, tell them the ticket has been submitted and give them a reference number (format: TKN-IT-XXXX with a random 4-digit number).

Keep responses concise and friendly. Don't use jargon. If the user's issue is urgent (system down, security concern, can't work), flag it clearly.`;

  let history = [];
  let isLoading = false;

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    input.style.height = 'auto';
    appendMessage('user', text);
    history.push({ role: 'user', content: text });
    setLoading(true);

    try {
     const res = await fetch('/api/proxy', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-allow-browser': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: history
        })
      });

      const data = await res.json();
      const reply = data.content?.find(b => b.type === 'text')?.text || 'Sorry, something went wrong. Please try again.';
      history.push({ role: 'assistant', content: reply });
      appendMessage('assistant', reply);
    } catch (e) {
      appendMessage('assistant', 'Connection error — please try again.');
    }

    setLoading(false);
  }

  function appendMessage(role, text) {
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const label = document.createElement('span');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'IT Help Desk';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function setLoading(val) {
    isLoading = val;
    document.getElementById('typing').style.display = val ? 'flex' : 'none';
    document.getElementById('send-btn').disabled = val;
    if (val) document.getElementById('messages').scrollTop = 9999;
  }

  function resetChat() {
    history = [];
    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    wrap.innerHTML = '<span class="msg-label">IT Help Desk</span><div class="bubble">Hi! I\'m the Takanock IT Help Desk assistant. Tell me what\'s going on — I\'ll gather the details and log a ticket for you. What issue are you running into?</div>';
    msgs.appendChild(wrap);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
</script>

</body>
</html>
