<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takanock IT Help Desk</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 680px;
      height: 620px;
      background: #fff;
      border: 0.5px solid #ddddd8;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 0.5px solid #ddddd8;
      background: #fff;
    }

    #header-left { display: flex; align-items: center; gap: 10px; }

    #logo {
      width: 30px;
      height: 30px;
      background: #1a1a1a;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #logo span { color: #fff; font-size: 11px; font-weight: 600; letter-spacing: -0.3px; }

    #header-title { font-size: 14px; font-weight: 500; color: #1a1a1a; }
    #header-sub { font-size: 12px; color: #888; }

    #new-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      padding: 6px 12px;
      border: 0.5px solid #ccc;
      border-radius: 8px;
      background: transparent;
      color: #666;
      cursor: pointer;
      transition: background 0.15s;
    }
    #new-btn:hover { background: #f5f5f3; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg { display: flex; flex-direction: column; gap: 4px; max-width: 82%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .user .bubble {
      background: #1a1a1a;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .assistant .bubble {
      background: #f5f5f3;
      color: #1a1a1a;
      border: 0.5px solid #ddddd8;
      border-bottom-left-radius: 4px;
    }

    .msg-label { font-size: 11px; color: #aaa; padding: 0 4px; }

    #typing {
      display: none;
      align-self: flex-start;
      padding: 0 0 4px;
    }
    #typing .bubble { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #bbb; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    #input-area {
      padding: 14px 18px;
      border-top: 0.5px solid #ddddd8;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #fff;
    }

    #msg-input {
      flex: 1;
      resize: none;
      border: 0.5px solid #ccc;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      color: #1a1a1a;
      background: #fff;
      max-height: 120px;
      outline: none;
      transition: border-color 0.15s;
    }
    #msg-input:focus { border-color: #999; }

    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: #1a1a1a;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    #send-btn:hover { opacity: 0.8; }
    #send-btn:disabled { opacity: 0.3; cursor: default; }

    #status-bar {
      padding: 6px 18px;
      background: #f9f9f7;
      border-top: 0.5px solid #ddddd8;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #status-dot { width: 6px; height: 6px; border-radius: 50%; background: #3B6D11; }
    #status-text { font-size: 11px; color: #888; }
  </style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="header-left">
      <div id="logo"><span>TKN</span></div>
      <div>
        <div id="header-title">IT Help Desk</div>
        <div id="header-sub">Submit a request</div>
      </div>
    </div>
    <button id="new-btn" onclick="resetChat()">
      <i class="ti ti-refresh"></i> New request
    </button>
  </div>

  <div id="messages">
    <div class="msg assistant">
      <span class="msg-label">IT Help Desk</span>
      <div class="bubble">Hi! I'm the Takanock IT Help Desk assistant. Tell me what's going on — I'll gather the details and log a ticket for you. What issue are you running into?</div>
    </div>
  </div>

  <div id="typing">
    <div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  </div>

  <div id="input-area">
    <textarea id="msg-input" rows="1" placeholder="Describe your IT issue…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" aria-label="Send">
      <i class="ti ti-arrow-up" style="font-size:18px"></i>
    </button>
  </div>

  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Connected — tickets log to Airtable</span>
  </div>
</div>

<script>
  // ⚠️ Replace with your actual Anthropic API key

  const SYSTEM_PROMPT = `You are the Takanock IT Help Desk intake assistant. Your job is to help Takanock employees submit IT support requests conversationally.

When a user describes an issue, gather these fields through friendly conversation (don't ask for everything at once — let it flow naturally):
- Submitter Name (full name)
- Submitter Email (their Takanock email)
- Department (Finance, Development, Engineering, Operations, GIS, Executive, Other)
- Request Type (Hardware, Software, Access/Permissions, Network, Other)
- Request Description (brief description of the issue)
- Urgency (Low, Medium, High, Urgent) — infer from context if possible and confirm
- Any steps already tried (add to description)

Once you have enough info, summarize the ticket and confirm with the user. Say: "Here's what I'll log — does this look right?" followed by the summary.

When the user confirms, respond with a JSON block in this exact format (and nothing else after it):
SUBMIT_TICKET:{"name":"...","email":"...","department":"...","requestType":"...","description":"...","urgency":"..."}

Then on a new line add a friendly confirmation message like: "Done! Your ticket has been submitted. Reference number: TKN-IT-XXXX"

Keep responses concise and friendly. Don't use jargon. If the issue is urgent (system down, security concern, can't work), flag it clearly.`;

let history = [];
let isLoading = false;

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  appendMessage('user', text);
  history.push({ role: 'user', content: text });
  setLoading(true);

  try {
    const res = await fetch('/api/proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();
    let reply = data.content?.find(b => b.type === 'text')?.text || 'Sorry, something went wrong. Please try again.';

    if (reply.includes('SUBMIT_TICKET:')) {
      const jsonMatch = reply.match(/SUBMIT_TICKET:(\{.*?\})/s);
      if (jsonMatch) {
        const record = JSON.parse(jsonMatch[1]);
        await fetch('/api/proxy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ airtable_record: record })
        });
        reply = reply.replace(/SUBMIT_TICKET:\{.*?\}/s, '').trim();
      }
    }

    history.push({ role: 'assistant', content: reply });
    appendMessage('assistant', reply);
  } catch (e) {
    appendMessage('assistant', 'Connection error — please try again.');
  }

  setLoading(false);
}

function appendMessage(role, text) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const label = document.createElement('span');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'IT Help Desk';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function setLoading(val) {
  isLoading = val;
  document.getElementById('typing').style.display = val ? 'flex' : 'none';
  document.getElementById('send-btn').disabled = val;
  if (val) document.getElementById('messages').scrollTop = 9999;
}

function resetChat() {
  history = [];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';
  wrap.innerHTML = '<span class="msg-label">IT Help Desk</span><div class="bubble">Hi! I\'m the Takanock IT Help Desk assistant. Tell me what\'s going on — I\'ll gather the details and log a ticket for you. What issue are you running into?</div>';
  msgs.appendChild(wrap);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>

</body>
</html>
